<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Analíticas · I+D</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --color-primary: #4caf50; --color-bg: #f8fafb; --color-card: #fff; --shadow: 0 8px 24px rgba(0,0,0,0.1); --radius: 14px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--color-bg); color: #333; }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .header h1 { font-size: 1.9rem; color: #2196f3; }
    .header-buttons { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .btn { background: var(--color-primary); color: #fff; border: none; padding: 9px 16px; border-radius: 999px; cursor: pointer; font-size: 0.9rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
    .btn-secondary { background: #6c757d; }
    .btn-danger { background: #f44336; }
    .btn:hover { opacity: 0.92; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .card { background: var(--color-card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px; }
    .card h3 { font-size: 1.1rem; margin-bottom: 14px; }
    canvas { max-height: 300px; }
    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .kpi { background: var(--color-card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; text-align: center; }
    .kpi .valor { font-size: 2rem; font-weight: 800; color: var(--color-primary); }
    .kpi .label { font-size: 0.8rem; color: #888; margin-top: 4px; }
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>📈 Analíticas del Departamento</h1>
      <div class="header-buttons">
        <span id="userInfo" style="font-size:0.85rem;color:#666;"></span>
        <a href="dashboard.html" class="btn btn-secondary">← Dashboard</a>
        <button onclick="cerrarSesion()" class="btn btn-danger">Cerrar sesión</button>
      </div>
    </header>

    <div class="kpi-row">
      <div class="kpi"><div class="valor" id="tasaExito">0%</div><div class="label">Tasa de Éxito</div></div>
      <div class="kpi"><div class="valor" id="roiPromedio">0%</div><div class="label">ROI Promedio</div></div>
      <div class="kpi"><div class="valor" id="avancePromedio">0%</div><div class="label">Avance Promedio</div></div>
      <div class="kpi"><div class="valor" id="tiempoPromedio">0</div><div class="label">Días Prom. Duración</div></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h3>🧪 Ensayos por Área</h3>
        <canvas id="chartPorArea"></canvas>
      </div>
      <div class="card">
        <h3>📅 Ensayos por Mes</h3>
        <canvas id="chartPorMes"></canvas>
      </div>
    </div>
    <div class="grid-2">
      <div class="card">
        <h3>🎯 Prioridad de Ensayos</h3>
        <canvas id="chartPrioridad"></canvas>
      </div>
      <div class="card">
        <h3>⚠️ Problemas por Área</h3>
        <canvas id="chartProblemasArea"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      var [e, p] = await Promise.all([DB.ensayos.listar(), DB.problemas.listar()]);
      var ensayos = e.data || [];
      var problemas = p.data || [];

      // KPIs
      var exitosos = ensayos.filter(function(x) { return x.exito; }).length;
      var finalizados = ensayos.filter(function(x) { return x.estado === 'finalizado'; }).length;
      document.getElementById('tasaExito').textContent = finalizados > 0 ? Math.round(exitosos / finalizados * 100) + '%' : '0%';

      var rois = ensayos.filter(function(x) { return x.roi_estimado; }).map(function(x) { return x.roi_estimado; });
      document.getElementById('roiPromedio').textContent = rois.length > 0 ? (rois.reduce(function(a,b){return a+b;},0) / rois.length).toFixed(1) + '%' : '0%';

      var avances = ensayos.map(function(x) { return x.porcentaje_avance || 0; });
      document.getElementById('avancePromedio').textContent = avances.length > 0 ? Math.round(avances.reduce(function(a,b){return a+b;},0) / avances.length) + '%' : '0%';

      var dias = ensayos.filter(function(x) { return x.fecha_inicio && x.fecha_fin_estimado; }).map(function(x) {
        return Math.round((new Date(x.fecha_fin_estimado) - new Date(x.fecha_inicio)) / 86400000);
      });
      document.getElementById('tiempoPromedio').textContent = dias.length > 0 ? Math.round(dias.reduce(function(a,b){return a+b;},0) / dias.length) : '0';

      // Por área
      var areas = {};
      ensayos.forEach(function(x) { areas[x.area || 'Sin área'] = (areas[x.area || 'Sin área'] || 0) + 1; });
      new Chart(document.getElementById('chartPorArea'), {
        type: 'bar',
        data: { labels: Object.keys(areas), datasets: [{ label: 'Ensayos', data: Object.values(areas), backgroundColor: '#4caf50' }] },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
      });

      // Por mes
      var meses = {};
      ensayos.forEach(function(x) {
        if (x.fecha_inicio) {
          var m = x.fecha_inicio.substring(0, 7);
          meses[m] = (meses[m] || 0) + 1;
        }
      });
      var mesesOrdenados = Object.keys(meses).sort();
      new Chart(document.getElementById('chartPorMes'), {
        type: 'line',
        data: { labels: mesesOrdenados, datasets: [{ label: 'Ensayos', data: mesesOrdenados.map(function(m) { return meses[m]; }), borderColor: '#2196f3', tension: 0.3, fill: true, backgroundColor: 'rgba(33,150,243,0.1)' }] },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
      });

      // Prioridad
      var prios = {};
      ensayos.forEach(function(x) { prios[x.prioridad || 'N/A'] = (prios[x.prioridad || 'N/A'] || 0) + 1; });
      new Chart(document.getElementById('chartPrioridad'), {
        type: 'doughnut',
        data: { labels: Object.keys(prios), datasets: [{ data: Object.values(prios), backgroundColor: ['#4caf50', '#ff9800', '#f44336', '#9e9e9e'] }] },
        options: { plugins: { legend: { position: 'bottom' } } }
      });

      // Problemas por área
      var pAreas = {};
      problemas.forEach(function(x) { pAreas[x.area || 'Sin área'] = (pAreas[x.area || 'Sin área'] || 0) + 1; });
      new Chart(document.getElementById('chartProblemasArea'), {
        type: 'bar',
        data: { labels: Object.keys(pAreas), datasets: [{ label: 'Problemas', data: Object.values(pAreas), backgroundColor: '#f97316' }] },
        options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true } } }
      });
    });
  </script>

  <script src="auth-guard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.SESION) {
        document.getElementById('userInfo').textContent = '👤 ' + window.SESION.nombre + ' (' + window.SESION.rol + ')';
      }
    });
  </script>
</body>
</html>
