<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Colaboradores · I+D</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { --color-primary: #4caf50; --color-bg: #f8fafb; --color-card: #fff; --shadow: 0 8px 24px rgba(0,0,0,0.1); --radius: 14px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--color-bg); color: #333; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .header h1 { font-size: 1.9rem; color: var(--color-primary); }
    .header-buttons { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .btn { background: var(--color-primary); color: #fff; border: none; padding: 9px 16px; border-radius: 999px; cursor: pointer; font-size: 0.9rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
    .btn-secondary { background: #6c757d; }
    .btn-danger { background: #f44336; }
    .btn:hover { opacity: 0.92; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card { background: var(--color-card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
    .card h3 { font-size: 1.1rem; margin-bottom: 6px; }
    .card p { font-size: 0.85rem; color: #666; margin-bottom: 4px; }
    .card-actions { display: flex; gap: 6px; margin-top: 10px; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; padding: 20px; }
    .modal-content { background: white; max-width: 550px; margin: 40px auto; border-radius: 16px; box-shadow: var(--shadow); padding: 22px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .close-btn { background: transparent; border: none; font-size: 1.4rem; cursor: pointer; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; margin-bottom: 4px; font-size: 0.9rem; font-weight: 500; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid #dde2eb; font-size: 0.9rem; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>👥 Colaboradores</h1>
      <div class="header-buttons">
        <span id="userInfo" style="font-size:0.85rem;color:#666;"></span>
        <a href="dashboard.html" class="btn btn-secondary">← Dashboard</a>
        <button onclick="abrirModal()" class="btn">+ Agregar Colaborador</button>
        <button onclick="cerrarSesion()" class="btn btn-danger">Cerrar sesión</button>
      </div>
    </header>
    <div class="grid" id="listaColaboradores">
      <p style="color:#aaa;">Cargando...</p>
    </div>
  </div>

  <div class="modal" id="modalColab">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitulo">Agregar Colaborador</h2>
        <button class="close-btn" onclick="cerrarModal()">×</button>
      </div>
      <form id="formColab" name="formColab">
        <div class="form-group">
          <label for="c_nombre">Nombre completo *</label>
          <input type="text" id="c_nombre" name="c_nombre" required>
        </div>
        <div class="form-group">
          <label for="c_rol">Rol / Puesto</label>
          <input type="text" id="c_rol" name="c_rol">
        </div>
        <div class="form-group">
          <label for="c_area">Área</label>
          <input type="text" id="c_area" name="c_area">
        </div>
        <div class="form-group">
          <label for="c_email">Email</label>
          <input type="email" id="c_email" name="c_email">
        </div>
        <div class="form-group">
          <label for="c_telefono">Teléfono</label>
          <input type="text" id="c_telefono" name="c_telefono">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
          <button type="submit" class="btn">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <script>
    var editandoId = null;
    var colabData = [];

    document.addEventListener('DOMContentLoaded', function() {
      cargarColaboradores();

      document.getElementById('formColab').addEventListener('submit', async function(e) {
        e.preventDefault();
        var datos = {
          nombre: document.getElementById('c_nombre').value.trim(),
          rol: document.getElementById('c_rol').value.trim(),
          area: document.getElementById('c_area').value.trim(),
          email: document.getElementById('c_email').value.trim(),
          telefono: document.getElementById('c_telefono').value.trim()
        };
        var resultado;
        if (editandoId) {
          resultado = await DB.colaboradores.actualizar(editandoId, datos);
        } else {
          datos.id = 'col_' + Date.now();
          resultado = await DB.colaboradores.crear(datos);
        }
        if (resultado.error) { alert('Error: ' + resultado.error.message); }
        else { cerrarModal(); cargarColaboradores(); }
      });
    });

    async function cargarColaboradores() {
      var { data, error } = await DB.colaboradores.listar();
      if (error) { alert('Error: ' + error.message); return; }
      colabData = data || [];
      renderizar();
    }

    function renderizar() {
      var container = document.getElementById('listaColaboradores');
      if (colabData.length === 0) {
        container.innerHTML = '<p style="color:#aaa;">No hay colaboradores registrados.</p>';
        return;
      }
      container.innerHTML = colabData.map(function(c) {
        return '<div class="card">' +
          '<h3>👤 ' + c.nombre + '</h3>' +
          '<p><strong>Rol:</strong> ' + (c.rol || '—') + '</p>' +
          '<p><strong>Área:</strong> ' + (c.area || '—') + '</p>' +
          '<p><strong>Email:</strong> ' + (c.email || '—') + '</p>' +
          '<p><strong>Tel:</strong> ' + (c.telefono || '—') + '</p>' +
          '<div class="card-actions">' +
          '<button onclick="editarColab(\'' + c.id + '\')" class="btn btn-secondary" style="padding:5px 10px;font-size:0.78rem;">Editar</button>' +
          '<button onclick="eliminarColab(\'' + c.id + '\')" class="btn btn-danger" style="padding:5px 10px;font-size:0.78rem;">Eliminar</button>' +
          '</div></div>';
      }).join('');
    }

    function abrirModal() {
      editandoId = null;
      document.getElementById('modalTitulo').textContent = 'Agregar Colaborador';
      document.getElementById('formColab').reset();
      document.getElementById('modalColab').style.display = 'block';
    }

    function editarColab(id) {
      var c = colabData.find(function(x) { return x.id === id; });
      if (!c) return;
      editandoId = id;
      document.getElementById('modalTitulo').textContent = 'Editar Colaborador';
      document.getElementById('c_nombre').value = c.nombre || '';
      document.getElementById('c_rol').value = c.rol || '';
      document.getElementById('c_area').value = c.area || '';
      document.getElementById('c_email').value = c.email || '';
      document.getElementById('c_telefono').value = c.telefono || '';
      document.getElementById('modalColab').style.display = 'block';
    }

    async function eliminarColab(id) {
      if (!confirm('¿Eliminar este colaborador?')) return;
      var { error } = await DB.colaboradores.eliminar(id);
      if (error) { alert('Error: ' + error.message); } else { cargarColaboradores(); }
    }

    function cerrarModal() {
      document.getElementById('modalColab').style.display = 'none';
      editandoId = null;
    }

    window.onclick = function(e) { if (e.target === document.getElementById('modalColab')) cerrarModal(); };
  </script>

  <script src="auth-guard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.SESION) {
        document.getElementById('userInfo').textContent = '👤 ' + window.SESION.nombre + ' (' + window.SESION.rol + ')';
      }
    });
  </script>
</body>
</html>
