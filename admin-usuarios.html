<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin Usuarios · I+D</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
  <style>
    :root { --color-primary: #4caf50; --color-bg: #f8fafb; --color-card: #fff; --shadow: 0 8px 24px rgba(0,0,0,0.1); --radius: 14px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--color-bg); color: #333; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .header h1 { font-size: 1.9rem; color: #9c27b0; }
    .header-buttons { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .btn { background: var(--color-primary); color: #fff; border: none; padding: 9px 16px; border-radius: 999px; cursor: pointer; font-size: 0.9rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
    .btn-secondary { background: #6c757d; }
    .btn-danger { background: #f44336; }
    .btn-info { background: #2196f3; }
    .btn-success { background: #4caf50; }
    .btn:hover { opacity: 0.92; }
    .table-container { background: var(--color-card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; overflow-x: auto; }
    #usuariosTable { width: 100%; }
    #usuariosTable th { background: #f8fafc; font-weight: 600; padding: 12px; }
    #usuariosTable td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; }
    .status-badge { padding: 4px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    .status-activo { background: #dcf4dc; color: #2e7d32; }
    .status-pendiente { background: #fff3cd; color: #ff8f00; }
    .status-bloqueado { background: #f8d7da; color: #c62828; }
    .no-admin { text-align: center; padding: 60px; font-size: 1.2rem; color: #c62828; }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>🔐 Administración de Usuarios</h1>
      <div class="header-buttons">
        <a href="dashboard.html" class="btn btn-secondary">← Dashboard</a>
        <button onclick="cerrarSesion()" class="btn btn-danger">Cerrar sesión</button>
      </div>
    </header>

    <div id="contenidoAdmin">
      <div class="table-container">
        <table id="usuariosTable" class="display">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Email</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
        </table>
      </div>
    </div>

    <div id="noAdmin" class="no-admin" style="display:none;">
      <p>⛔ No tienes permisos para acceder a esta página.</p>
      <a href="dashboard.html" class="btn btn-secondary" style="margin-top:16px;">← Volver al Dashboard</a>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <script>
    var tablaUsuarios = null;
    var usuariosData = [];

    document.addEventListener('DOMContentLoaded', function() {
      cargarUsuarios();
    });

    async function cargarUsuarios() {
      var { data, error } = await DB.usuarios.listar();
      if (error) { alert('Error: ' + error.message); return; }
      usuariosData = data || [];
      inicializarTabla(usuariosData);
    }

    function inicializarTabla(datos) {
      if (tablaUsuarios) { tablaUsuarios.destroy(); $('#usuariosTable').empty(); }
      tablaUsuarios = $('#usuariosTable').DataTable({
        data: datos,
        columns: [
          { data: 'nombre', defaultContent: '' },
          { data: 'email', defaultContent: '' },
          {
            data: 'rol', defaultContent: '',
            render: function(d) { return d || 'pendiente'; }
          },
          {
            data: 'estado', defaultContent: '',
            render: function(d) {
              var cls = { activo:'status-activo', pendiente:'status-pendiente', bloqueado:'status-bloqueado' };
              return '<span class="status-badge ' + (cls[d] || '') + '">' + (d || 'pendiente') + '</span>';
            }
          },
          {
            data: null, orderable: false,
            render: function(data, type, row) {
              var btns = '';
              if (row.estado === 'pendiente') {
                btns += '<button onclick="aprobarUsuario(\'' + row.id + '\')" class="btn btn-success" style="padding:5px 10px;font-size:0.78rem;">✅ Aprobar</button> ';
              }
              if (row.estado !== 'bloqueado') {
                btns += '<button onclick="bloquearUsuario(\'' + row.id + '\')" class="btn btn-danger" style="padding:5px 10px;font-size:0.78rem;">🚫 Bloquear</button> ';
              } else {
                btns += '<button onclick="desbloquearUsuario(\'' + row.id + '\')" class="btn btn-info" style="padding:5px 10px;font-size:0.78rem;">🔓 Desbloquear</button> ';
              }
              btns += '<select onchange="cambiarRol(\'' + row.id + '\', this.value)" style="padding:4px;border-radius:6px;font-size:0.78rem;">';
              ['admin', 'editor', 'lector', 'pendiente'].forEach(function(r) {
                btns += '<option value="' + r + '"' + (row.rol === r ? ' selected' : '') + '>' + r + '</option>';
              });
              btns += '</select>';
              return btns;
            }
          }
        ],
        pageLength: 25,
        language: { url: '//cdn.datatables.net/plug-ins/1.13.7/i18n/es-ES.json' }
      });
    }

    async function aprobarUsuario(id) {
      await DB.usuarios.actualizar(id, { estado: 'activo', rol: 'lector' });
      cargarUsuarios();
    }

    async function bloquearUsuario(id) {
      if (!confirm('¿Bloquear este usuario?')) return;
      await DB.usuarios.actualizar(id, { estado: 'bloqueado' });
      cargarUsuarios();
    }

    async function desbloquearUsuario(id) {
      await DB.usuarios.actualizar(id, { estado: 'activo' });
      cargarUsuarios();
    }

    async function cambiarRol(id, nuevoRol) {
      await DB.usuarios.actualizar(id, { rol: nuevoRol });
      cargarUsuarios();
    }
  </script>

  <script src="auth-guard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!window.SESION || window.SESION.rol !== 'admin') {
        document.getElementById('contenidoAdmin').style.display = 'none';
        document.getElementById('noAdmin').style.display = 'block';
      }
    });
  </script>
</body>
</html>
