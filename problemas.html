<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reporte de Problemas · I+D</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
  <style>
    :root { --color-primary: #4caf50; --color-bg: #f8fafb; --color-card: #fff; --shadow: 0 8px 24px rgba(0,0,0,0.1); --radius: 14px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--color-bg); color: #333; }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .header h1 { font-size: 1.9rem; color: #f44336; }
    .header-buttons { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .btn { background: var(--color-primary); color: #fff; border: none; padding: 9px 16px; border-radius: 999px; cursor: pointer; font-size: 0.9rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; transition: all 0.2s; }
    .btn-secondary { background: #6c757d; }
    .btn-danger { background: #f44336; }
    .btn-warning { background: #ff9800; }
    .btn:hover { opacity: 0.92; }
    .table-container { background: var(--color-card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; overflow-x: auto; }
    #problemasTable { width: 100%; }
    #problemasTable th { background: #f8fafc; font-weight: 600; padding: 12px; }
    #problemasTable td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; }
    .status-badge { padding: 4px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    .status-abierto { background: #f8d7da; color: #c62828; }
    .status-en_proceso { background: #fff3cd; color: #ff8f00; }
    .status-resuelto { background: #dcf4dc; color: #2e7d32; }
    .status-cerrado { background: #e3f2fd; color: #1565c0; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; padding: 20px; }
    .modal-content { background: white; max-width: 700px; margin: 30px auto; border-radius: 16px; box-shadow: var(--shadow); padding: 22px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .close-btn { background: transparent; border: none; font-size: 1.4rem; cursor: pointer; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; margin-bottom: 4px; font-size: 0.9rem; font-weight: 500; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid #dde2eb; font-size: 0.9rem; }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
    @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>⚠️ Reporte de Problemas</h1>
      <div class="header-buttons">
        <span id="userInfo" style="font-size:0.85rem;color:#666;"></span>
        <a href="dashboard.html" class="btn btn-secondary">← Dashboard</a>
        <button onclick="abrirModal()" class="btn btn-warning">+ Reportar Problema</button>
        <button onclick="cerrarSesion()" class="btn btn-danger">Cerrar sesión</button>
      </div>
    </header>

    <div class="table-container">
      <table id="problemasTable" class="display">
        <thead>
          <tr>
            <th>Área</th>
            <th>Descripción</th>
            <th>Prioridad</th>
            <th>Reportado por</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal" id="modalProblema">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitulo">Reportar Problema</h2>
        <button class="close-btn" onclick="cerrarModal()">×</button>
      </div>
      <form id="formProblema" name="formProblema">
        <div class="form-row">
          <div class="form-group">
            <label for="p_area">Área *</label>
            <input type="text" id="p_area" name="p_area" required>
          </div>
          <div class="form-group">
            <label for="p_reportadoPor">Reportado por *</label>
            <input type="text" id="p_reportadoPor" name="p_reportadoPor" required>
          </div>
        </div>
        <div class="form-group">
          <label for="p_descripcion">Descripción *</label>
          <textarea id="p_descripcion" name="p_descripcion" required></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="p_prioridad">Prioridad</label>
            <select id="p_prioridad" name="p_prioridad">
              <option value="Baja">Baja</option>
              <option value="Media" selected>Media</option>
              <option value="Alta">Alta</option>
              <option value="Urgente">Urgente</option>
            </select>
          </div>
          <div class="form-group">
            <label for="p_estado">Estado</label>
            <select id="p_estado" name="p_estado">
              <option value="abierto">Abierto</option>
              <option value="en_proceso">En proceso</option>
              <option value="resuelto">Resuelto</option>
              <option value="cerrado">Cerrado</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="p_solucion">Solución</label>
          <textarea id="p_solucion" name="p_solucion"></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
          <button type="submit" class="btn" id="btnGuardarP">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <script>
    var tablaProblemas = null;
    var editandoId = null;
    var problemasData = [];

    document.addEventListener('DOMContentLoaded', function() {
      cargarProblemas();

      document.getElementById('formProblema').addEventListener('submit', async function(e) {
        e.preventDefault();
        var btn = document.getElementById('btnGuardarP');
        btn.disabled = true;
        btn.textContent = 'Guardando...';

        var datos = {
          area: document.getElementById('p_area').value.trim(),
          reportado_por: document.getElementById('p_reportadoPor').value.trim(),
          descripcion: document.getElementById('p_descripcion').value.trim(),
          prioridad: document.getElementById('p_prioridad').value,
          estado: document.getElementById('p_estado').value,
          solucion: document.getElementById('p_solucion').value.trim()
        };

        if (datos.estado === 'resuelto' || datos.estado === 'cerrado') {
          datos.fecha_cierre = new Date().toISOString().split('T')[0];
        }

        var resultado;
        if (editandoId) {
          resultado = await DB.problemas.actualizar(editandoId, datos);
        } else {
          datos.id = 'prob_' + Date.now();
          resultado = await DB.problemas.crear(datos);
        }

        if (resultado.error) {
          alert('Error: ' + resultado.error.message);
        } else {
          cerrarModal();
          recargarTabla();
        }
        btn.disabled = false;
        btn.textContent = 'Guardar';
      });
    });

    async function cargarProblemas() {
      var { data, error } = await DB.problemas.listar();
      if (error) { alert('Error: ' + error.message); return; }
      problemasData = data || [];
      inicializarTabla(problemasData);
    }

    function inicializarTabla(datos) {
      if (tablaProblemas) { tablaProblemas.destroy(); $('#problemasTable').empty(); }
      tablaProblemas = $('#problemasTable').DataTable({
        data: datos,
        columns: [
          { data: 'area', defaultContent: '' },
          { data: 'descripcion', defaultContent: '', render: function(d) { return d ? (d.length > 60 ? d.substring(0,60) + '...' : d) : ''; } },
          { data: 'prioridad', defaultContent: '' },
          { data: 'reportado_por', defaultContent: '' },
          { data: 'created_at', defaultContent: '', render: function(d) { return d ? new Date(d).toLocaleDateString('es-DO') : ''; } },
          {
            data: 'estado', defaultContent: '',
            render: function(d) {
              var cls = { abierto:'status-abierto', en_proceso:'status-en_proceso', resuelto:'status-resuelto', cerrado:'status-cerrado' };
              return '<span class="status-badge ' + (cls[d] || '') + '">' + (d || '') + '</span>';
            }
          },
          {
            data: null,
            orderable: false,
            render: function(data, type, row) {
              return `
                <button onclick="verProblema('${row.id}')" class="btn btn-warning" style="padding:5px 10px;font-size:0.78rem;">
                  Ver
                </button>
                <button onclick="editarProblema('${row.id}')" class="btn btn-secondary" style="padding:5px 10px;font-size:0.78rem;">
                  Editar
                </button>
                <button onclick="eliminarProblema('${row.id}')" class="btn btn-danger" style="padding:5px 10px;font-size:0.78rem;">
                  Eliminar
                </button>
              `;
            }
          }
        ],
        pageLength: 25,
        language: { url: '//cdn.datatables.net/plug-ins/1.13.7/i18n/es-ES.json' }
      });
    }

    async function recargarTabla() {
      var { data } = await DB.problemas.listar();
      problemasData = data || [];
      inicializarTabla(problemasData);
    }

    function habilitarCampos() {
      ['p_area','p_reportadoPor','p_descripcion','p_prioridad','p_estado','p_solucion']
        .forEach(idEl => document.getElementById(idEl).removeAttribute('disabled'));
      document.getElementById('btnGuardarP').style.display = 'inline-flex';
    }

    function deshabilitarCampos() {
      ['p_area','p_reportadoPor','p_descripcion','p_prioridad','p_estado','p_solucion']
        .forEach(idEl => document.getElementById(idEl).setAttribute('disabled','disabled'));
      document.getElementById('btnGuardarP').style.display = 'none';
    }

    function abrirModal() {
      editandoId = null;
      habilitarCampos();
      document.getElementById('modalTitulo').textContent = 'Reportar Problema';
      document.getElementById('formProblema').reset();
      document.getElementById('modalProblema').style.display = 'block';
    }

    function editarProblema(id) {
      var prob = problemasData.find(function(p) { return p.id === id; });
      if (!prob) return;
      editandoId = id;
      habilitarCampos();
      document.getElementById('modalTitulo').textContent = 'Editar Problema';
      document.getElementById('p_area').value = prob.area || '';
      document.getElementById('p_reportadoPor').value = prob.reportado_por || '';
      document.getElementById('p_descripcion').value = prob.descripcion || '';
      document.getElementById('p_prioridad').value = prob.prioridad || 'Media';
      document.getElementById('p_estado').value = prob.estado || 'abierto';
      document.getElementById('p_solucion').value = prob.solucion || '';
      document.getElementById('modalProblema').style.display = 'block';
    }

    function verProblema(id) {
      var prob = problemasData.find(function(p) { return p.id === id; });
      if (!prob) return;

      editandoId = null;
      deshabilitarCampos();
      document.getElementById('modalTitulo').textContent = 'Detalle del Problema';

      document.getElementById('p_area').value = prob.area || '';
      document.getElementById('p_reportadoPor').value = prob.reportado_por || '';
      document.getElementById('p_descripcion').value = prob.descripcion || '';
      document.getElementById('p_prioridad').value = prob.prioridad || 'Media';
      document.getElementById('p_estado').value = prob.estado || 'abierto';
      document.getElementById('p_solucion').value = prob.solucion || '';

      document.getElementById('modalProblema').style.display = 'block';
    }

    async function eliminarProblema(id) {
      if (!confirm('¿Eliminar este problema?')) return;
      var { error } = await DB.problemas.eliminar(id);
      if (error) { alert('Error: ' + error.message); } else { recargarTabla(); }
    }

    function cerrarModal() {
      document.getElementById('modalProblema').style.display = 'none';
      editandoId = null;
      habilitarCampos();
    }

    window.onclick = function(e) {
      if (e.target === document.getElementById('modalProblema')) cerrarModal();
    };
  </script>

  <script src="auth-guard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.SESION) {
        document.getElementById('userInfo').textContent =
          '👤 ' + window.SESION.nombre + ' (' + window.SESION.rol + ')';
      }
    });
  </script>
</body>
</html>
