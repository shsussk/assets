<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Historias de Éxito · I+D</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { --color-primary: #4caf50; --color-bg: #f8fafb; --color-card: #fff; --shadow: 0 8px 24px rgba(0,0,0,0.1); --radius: 14px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--color-bg); color: #333; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .header h1 { font-size: 1.9rem; color: #f9a825; }
    .header-buttons { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .btn { background: var(--color-primary); color: #fff; border: none; padding: 9px 16px; border-radius: 999px; cursor: pointer; font-size: 0.9rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
    .btn-secondary { background: #6c757d; }
    .btn-danger { background: #f44336; }
    .btn-accent { background: #f9a825; }
    .btn:hover { opacity: 0.92; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .card { background: var(--color-card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px; }
    .card h3 { font-size: 1.1rem; margin-bottom: 6px; color: var(--color-primary); }
    .card p { font-size: 0.85rem; color: #666; margin-bottom: 4px; line-height: 1.5; }
    .card-badge { display: inline-block; padding: 3px 8px; border-radius: 999px; font-size: 0.7rem; font-weight: 600; background: #dcf4dc; color: #2e7d32; }
    .card-actions { display: flex; gap: 6px; margin-top: 10px; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; padding: 20px; }
    .modal-content { background: white; max-width: 600px; margin: 30px auto; border-radius: 16px; box-shadow: var(--shadow); padding: 22px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .close-btn { background: transparent; border: none; font-size: 1.4rem; cursor: pointer; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; margin-bottom: 4px; font-size: 0.9rem; font-weight: 500; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid #dde2eb; font-size: 0.9rem; }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>🏆 Historias de Éxito</h1>
      <div class="header-buttons">
        <span id="userInfo" style="font-size:0.85rem;color:#666;"></span>
        <a href="dashboard.html" class="btn btn-secondary">← Dashboard</a>
        <button onclick="abrirModal()" class="btn btn-accent">+ Nueva Historia</button>
        <button onclick="cerrarSesion()" class="btn btn-danger">Cerrar sesión</button>
      </div>
    </header>
    <div class="grid" id="listaHistorias">
      <p style="color:#aaa;">Cargando...</p>
    </div>
  </div>

  <div class="modal" id="modalHistoria">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitulo">Nueva Historia de Éxito</h2>
        <button class="close-btn" onclick="cerrarModal()">×</button>
      </div>
      <form id="formHistoria" name="formHistoria">
        <div class="form-group">
          <label for="h_titulo">Título *</label>
          <input type="text" id="h_titulo" name="h_titulo" required>
        </div>
        <div class="form-group">
          <label for="h_area">Área</label>
          <input type="text" id="h_area" name="h_area">
        </div>
        <div class="form-group">
          <label for="h_descripcion">Descripción</label>
          <textarea id="h_descripcion" name="h_descripcion"></textarea>
        </div>
        <div class="form-group">
          <label for="h_impacto">Impacto</label>
          <textarea id="h_impacto" name="h_impacto"></textarea>
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:8px;">
          <input type="checkbox" id="h_visible" name="h_visible">
          <label for="h_visible" style="margin:0;">Visible en Dashboard</label>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
          <button type="submit" class="btn">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <script>
    var editandoId = null;
    var historiasData = [];

    document.addEventListener('DOMContentLoaded', function() {
      cargarHistorias();

      document.getElementById('formHistoria').addEventListener('submit', async function(e) {
        e.preventDefault();
        var datos = {
          titulo: document.getElementById('h_titulo').value.trim(),
          area: document.getElementById('h_area').value.trim(),
          descripcion: document.getElementById('h_descripcion').value.trim(),
          impacto: document.getElementById('h_impacto').value.trim(),
          visible_en_home: document.getElementById('h_visible').checked
        };
        var resultado;
        if (editandoId) {
          resultado = await DB.historias.actualizar(editandoId, datos);
        } else {
          datos.id = 'hist_' + Date.now();
          resultado = await DB.historias.crear(datos);
        }
        if (resultado.error) { alert('Error: ' + resultado.error.message); }
        else { cerrarModal(); cargarHistorias(); }
      });
    });

    async function cargarHistorias() {
      var { data, error } = await DB.historias.listar();
      if (error) { alert('Error: ' + error.message); return; }
      historiasData = data || [];
      renderizar();
    }

    function renderizar() {
      var container = document.getElementById('listaHistorias');
      if (historiasData.length === 0) {
        container.innerHTML = '<p style="color:#aaa;">No hay historias de éxito registradas.</p>';
        return;
      }
      container.innerHTML = historiasData.map(function(h) {
        var badge = h.visible_en_home ? '<span class="card-badge">⭐ Destacada</span>' : '';
        return '<div class="card">' +
          '<h3>🏆 ' + h.titulo + '</h3>' + badge +
          '<p><strong>Área:</strong> ' + (h.area || '—') + '</p>' +
          '<p>' + (h.descripcion || '') + '</p>' +
          (h.impacto ? '<p><strong>Impacto:</strong> ' + h.impacto + '</p>' : '') +
          '<div class="card-actions">' +
          '<button onclick="editarHistoria(\'' + h.id + '\')" class="btn btn-secondary" style="padding:5px 10px;font-size:0.78rem;">Editar</button>' +
          '<button onclick="eliminarHistoria(\'' + h.id + '\')" class="btn btn-danger" style="padding:5px 10px;font-size:0.78rem;">Eliminar</button>' +
          '</div></div>';
      }).join('');
    }

    function abrirModal() {
      editandoId = null;
      document.getElementById('modalTitulo').textContent = 'Nueva Historia de Éxito';
      document.getElementById('formHistoria').reset();
      document.getElementById('modalHistoria').style.display = 'block';
    }

    function editarHistoria(id) {
      var h = historiasData.find(function(x) { return x.id === id; });
      if (!h) return;
      editandoId = id;
      document.getElementById('modalTitulo').textContent = 'Editar Historia';
      document.getElementById('h_titulo').value = h.titulo || '';
      document.getElementById('h_area').value = h.area || '';
      document.getElementById('h_descripcion').value = h.descripcion || '';
      document.getElementById('h_impacto').value = h.impacto || '';
      document.getElementById('h_visible').checked = !!h.visible_en_home;
      document.getElementById('modalHistoria').style.display = 'block';
    }

    async function eliminarHistoria(id) {
      if (!confirm('¿Eliminar esta historia?')) return;
      var { error } = await DB.historias.eliminar(id);
      if (error) { alert('Error: ' + error.message); } else { cargarHistorias(); }
    }

    function cerrarModal() {
      document.getElementById('modalHistoria').style.display = 'none';
      editandoId = null;
    }

    window.onclick = function(e) { if (e.target === document.getElementById('modalHistoria')) cerrarModal(); };
  </script>

  <script src="auth-guard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.SESION) {
        document.getElementById('userInfo').textContent = '👤 ' + window.SESION.nombre + ' (' + window.SESION.rol + ')';
      }
    });
  </script>
</body>
</html>
