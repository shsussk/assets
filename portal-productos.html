<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline de Productos Externos · I+D</title>
  <style>
    :root {
      --color-white: rgba(255,255,255,1);
      --color-black: rgba(0,0,0,1);
      --color-cream-50: rgba(252,252,249,1);
      --color-cream-100: rgba(255,255,253,1);
      --color-gray-200: rgba(245,245,245,1);
      --color-gray-300: rgba(167,169,169,1);
      --color-gray-400: rgba(119,124,124,1);
      --color-slate-500: rgba(98,108,113,1);
      --color-brown-600: rgba(94,82,64,1);
      --color-charcoal-700: rgba(31,33,33,1);
      --color-charcoal-800: rgba(38,40,40,1);
      --color-slate-900: rgba(19,52,59,1);
      --color-teal-300: rgba(50,184,198,1);
      --color-teal-400: rgba(45,166,178,1);
      --color-teal-500: rgba(33,128,141,1);
      --color-teal-600: rgba(29,116,128,1);
      --color-teal-700: rgba(26,104,115,1);
      --color-teal-800: rgba(41,150,161,1);
      --color-red-400: rgba(255,84,89,1);
      --color-red-500: rgba(192,21,47,1);
      --color-orange-400: rgba(230,129,97,1);
      --color-orange-500: rgba(168,75,47,1);
      --color-brown-600-rgb: 94,82,64;
      --color-teal-500-rgb: 33,128,141;
      --color-slate-900-rgb: 19,52,59;
      --color-slate-500-rgb: 98,108,113;
      --color-red-500-rgb: 192,21,47;
      --color-red-400-rgb: 255,84,89;
      --color-orange-500-rgb: 168,75,47;
      --color-orange-400-rgb: 230,129,97;
      --color-background: var(--color-cream-50);
      --color-surface: var(--color-cream-100);
      --color-text: var(--color-slate-900);
      --color-text-secondary: var(--color-slate-500);
      --color-primary: var(--color-teal-500);
      --color-primary-hover: var(--color-teal-600);
      --color-primary-active: var(--color-teal-700);
      --color-secondary: rgba(var(--color-brown-600-rgb),0.12);
      --color-secondary-hover: rgba(var(--color-brown-600-rgb),0.2);
      --color-border: rgba(var(--color-brown-600-rgb),0.2);
      --color-btn-primary-text: var(--color-cream-50);
      --color-card-border: rgba(var(--color-brown-600-rgb),0.12);
      --color-error: var(--color-red-500);
      --color-success: var(--color-teal-500);
      --color-warning: var(--color-orange-500);
      --color-info: var(--color-slate-500);
      --color-focus-ring: rgba(var(--color-teal-500-rgb),0.4);
      --color-success-rgb: 33,128,141;
      --color-error-rgb: 192,21,47;
      --color-warning-rgb: 168,75,47;
      --color-info-rgb: 98,108,113;
      --font-family-base: "FKGroteskNeue","Geist","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      --font-size-xs: 11px; --font-size-sm: 12px; --font-size-base: 14px;
      --font-size-lg: 16px; --font-size-xl: 18px; --font-size-2xl: 20px;
      --font-size-3xl: 24px; --font-size-4xl: 30px;
      --font-weight-medium: 500; --font-weight-semibold: 550; --font-weight-bold: 600;
      --line-height-tight: 1.2; --line-height-normal: 1.5;
      --space-4: 4px; --space-6: 6px; --space-8: 8px; --space-10: 10px;
      --space-12: 12px; --space-16: 16px; --space-20: 20px; --space-24: 24px; --space-32: 32px;
      --radius-sm: 6px; --radius-base: 8px; --radius-md: 10px; --radius-lg: 12px; --radius-full: 9999px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.02);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.04),0 2px 4px -1px rgba(0,0,0,0.02);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.04),0 4px 6px -2px rgba(0,0,0,0.02);
      --duration-fast: 150ms; --duration-normal: 250ms;
      --ease-standard: cubic-bezier(0.16,1,0.3,1);
    }
    @media(prefers-color-scheme:dark){:root{
      --color-gray-400-rgb:119,124,124;--color-teal-300-rgb:50,184,198;
      --color-gray-300-rgb:167,169,169;--color-gray-200-rgb:245,245,245;
      --color-background:var(--color-charcoal-700);--color-surface:var(--color-charcoal-800);
      --color-text:var(--color-gray-200);--color-text-secondary:rgba(var(--color-gray-300-rgb),0.7);
      --color-primary:var(--color-teal-300);--color-primary-hover:var(--color-teal-400);
      --color-primary-active:var(--color-teal-800);
      --color-secondary:rgba(var(--color-gray-400-rgb),0.15);
      --color-secondary-hover:rgba(var(--color-gray-400-rgb),0.25);
      --color-border:rgba(var(--color-gray-400-rgb),0.3);
      --color-error:var(--color-red-400);--color-success:var(--color-teal-300);
      --color-warning:var(--color-orange-400);--color-info:var(--color-gray-300);
      --color-focus-ring:rgba(var(--color-teal-300-rgb),0.4);
      --color-btn-primary-text:var(--color-slate-900);
      --color-card-border:rgba(var(--color-gray-400-rgb),0.2);
      --color-success-rgb:50,184,198;--color-error-rgb:255,84,89;
      --color-warning-rgb:230,129,97;--color-info-rgb:167,169,169;
    }}
    *,*::before,*::after{box-sizing:border-box}
    html{font-size:var(--font-size-base);font-family:var(--font-family-base);
      line-height:var(--line-height-normal);color:var(--color-text);
      background:var(--color-background);-webkit-font-smoothing:antialiased}
    body{margin:0;padding:0}
    h1,h2,h3,h4{margin:0;font-weight:var(--font-weight-semibold);line-height:var(--line-height-tight);color:var(--color-text)}

    .app-header{padding:var(--space-16) var(--space-24);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-12);border-bottom:1px solid var(--color-border)}
    .app-header h1{font-size:var(--font-size-2xl);display:flex;align-items:center;gap:var(--space-8)}
    .header-actions{display:flex;gap:var(--space-8);align-items:center;flex-wrap:wrap}

    .btn{display:inline-flex;align-items:center;justify-content:center;padding:var(--space-8) var(--space-16);
      border-radius:var(--radius-base);font-size:var(--font-size-base);font-weight:500;cursor:pointer;
      border:none;transition:all var(--duration-normal) var(--ease-standard);text-decoration:none;gap:var(--space-6)}
    .btn--primary{background:var(--color-primary);color:var(--color-btn-primary-text)}
    .btn--primary:hover{background:var(--color-primary-hover)}
    .btn--secondary{background:var(--color-secondary);color:var(--color-text)}
    .btn--secondary:hover{background:var(--color-secondary-hover)}
    .btn--danger{background:rgba(var(--color-error-rgb),0.12);color:var(--color-error)}
    .btn--danger:hover{background:rgba(var(--color-error-rgb),0.2)}
    .btn--success{background:rgba(var(--color-success-rgb),0.12);color:var(--color-success)}
    .btn--success:hover{background:rgba(var(--color-success-rgb),0.2)}
    .btn--warning{background:rgba(var(--color-warning-rgb),0.12);color:var(--color-warning)}
    .btn--warning:hover{background:rgba(var(--color-warning-rgb),0.2)}
    .btn--sm{padding:var(--space-4) var(--space-12);font-size:var(--font-size-sm);border-radius:var(--radius-sm)}

    .kpi-bar{display:flex;gap:var(--space-12);padding:var(--space-16) var(--space-24);overflow-x:auto;flex-wrap:wrap}
    .kpi-card{background:var(--color-surface);border:1px solid var(--color-card-border);border-radius:var(--radius-lg);
      padding:var(--space-12) var(--space-16);min-width:140px;flex:1}
    .kpi-card .kpi-value{font-size:var(--font-size-3xl);font-weight:var(--font-weight-bold);color:var(--color-primary)}
    .kpi-card .kpi-label{font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-top:var(--space-4)}

    .filters-bar{display:flex;gap:var(--space-12);padding:0 var(--space-24) var(--space-16);flex-wrap:wrap;align-items:flex-end}
    .filter-group{display:flex;flex-direction:column;gap:var(--space-4)}
    .filter-group label{font-size:var(--font-size-xs);font-weight:var(--font-weight-medium);color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.05em}
    .filter-group select,.filter-group input{padding:var(--space-6) var(--space-10);border-radius:var(--radius-base);
      border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text);font-size:var(--font-size-sm);min-width:140px}

    .view-toggle{display:flex;gap:2px;background:var(--color-secondary);border-radius:var(--radius-base);padding:2px}
    .view-toggle button{padding:var(--space-6) var(--space-12);border:none;background:transparent;border-radius:var(--radius-sm);
      cursor:pointer;font-size:var(--font-size-sm);color:var(--color-text-secondary);font-weight:var(--font-weight-medium}
    .view-toggle button.active{background:var(--color-surface);color:var(--color-text);box-shadow:var(--shadow-sm)}

    .kanban-container{display:flex;gap:var(--space-12);padding:0 var(--space-24) var(--space-24);overflow-x:auto;min-height:60vh}
    .kanban-column{min-width:260px;max-width:300px;flex:1;display:flex;flex-direction:column;gap:var(--space-8)}
    .kanban-column-header{padding:var(--space-10) var(--space-12);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
      font-weight:var(--font-weight-semibold);font-size:var(--font-size-sm);display:flex;align-items:center;justify-content:space-between}
    .kanban-column-body{flex:1;display:flex;flex-direction:column;gap:var(--space-8);padding:var(--space-8);
      background:var(--color-secondary);border-radius:0 0 var(--radius-lg) var(--radius-lg);min-height:100px;
      transition:background var(--duration-fast)}
    .kanban-column-body.drag-over{background:rgba(var(--color-teal-500-rgb),0.1)}
    .col-recibido .kanban-column-header{background:rgba(var(--color-info-rgb),0.15);color:var(--color-info)}
    .col-info-incompleta .kanban-column-header{background:rgba(var(--color-warning-rgb),0.15);color:var(--color-warning)}
    .col-en-evaluacion .kanban-column-header{background:rgba(59,130,246,0.12);color:rgb(59,130,246)}
    .col-aprobado-reunion .kanban-column-header{background:rgba(var(--color-success-rgb),0.15);color:var(--color-success)}
    .col-propuesto-ensayo .kanban-column-header{background:rgba(147,51,234,0.12);color:rgb(147,51,234)}
    .col-ensayo-campo .kanban-column-header{background:rgba(var(--color-teal-500-rgb),0.18);color:var(--color-primary)}
    .col-cerrado .kanban-column-header{background:rgba(var(--color-success-rgb),0.2);color:var(--color-success)}
    .col-rechazado .kanban-column-header{background:rgba(var(--color-error-rgb),0.12);color:var(--color-error)}
    .col-count{background:rgba(0,0,0,0.1);border-radius:var(--radius-full);padding:2px 8px;font-size:var(--font-size-xs)}

    .product-card{background:var(--color-surface);border:1px solid var(--color-card-border);border-radius:var(--radius-md);
      padding:var(--space-12);cursor:grab;transition:all var(--duration-fast);position:relative}
    .product-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
    .product-card.dragging{opacity:0.5;transform:rotate(2deg)}
    .product-card-name{font-weight:var(--font-weight-semibold);font-size:var(--font-size-base);margin-bottom:var(--space-4)}
    .product-card-empresa{font-size:var(--font-size-xs);color:var(--color-text-secondary)}
    .product-card-meta{display:flex;gap:var(--space-6);margin-top:var(--space-8);flex-wrap:wrap}
    .tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--radius-full);font-size:var(--font-size-xs);font-weight:var(--font-weight-medium)}
    .tag-tipo{background:rgba(59,130,246,0.1);color:rgb(59,130,246)}
    .tag-cultivo{background:rgba(34,197,94,0.1);color:rgb(34,197,94)}
    .tag-score{font-weight:var(--font-weight-bold);font-size:var(--font-size-sm)}
    .tag-score.high{background:rgba(var(--color-success-rgb),0.15);color:var(--color-success)}
    .tag-score.medium{background:rgba(59,130,246,0.12);color:rgb(59,130,246)}
    .tag-score.low{background:rgba(var(--color-warning-rgb),0.12);color:var(--color-warning)}
    .tag-score.none{background:rgba(var(--color-error-rgb),0.12);color:var(--color-error)}

    .table-container{padding:0 var(--space-24) var(--space-24);display:none}
    .table-container.active{display:block}
    .data-table{width:100%;border-collapse:collapse;background:var(--color-surface);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--color-card-border)}
    .data-table th{background:var(--color-secondary);padding:var(--space-10) var(--space-12);text-align:left;
      font-size:var(--font-size-xs);text-transform:uppercase;letter-spacing:0.05em;color:var(--color-text-secondary);font-weight:var(--font-weight-semibold)}
    .data-table td{padding:var(--space-10) var(--space-12);border-bottom:1px solid var(--color-card-border);font-size:var(--font-size-sm)}
    .data-table tr:hover td{background:var(--color-secondary)}
    .data-table tr{cursor:pointer}

    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;padding:var(--space-20);
      overflow-y:auto;animation:fadeIn 0.2s ease}
    .modal-overlay.active{display:flex;align-items:flex-start;justify-content:center}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal{background:var(--color-surface);border-radius:var(--radius-lg);max-width:900px;width:100%;
      box-shadow:var(--shadow-lg);margin:40px auto;animation:slideUp 0.25s var(--ease-standard)}
    @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-header{display:flex;justify-content:space-between;align-items:center;padding:var(--space-16) var(--space-20);border-bottom:1px solid var(--color-border)}
    .modal-header h2{font-size:var(--font-size-xl)}
    .modal-close{background:none;border:none;font-size:var(--font-size-xl);cursor:pointer;color:var(--color-text-secondary);padding:var(--space-4)}
    .modal-close:hover{color:var(--color-text)}
    .modal-body{padding:var(--space-20)}
    .modal-footer{padding:var(--space-12) var(--space-20);border-top:1px solid var(--color-border);display:flex;justify-content:flex-end;gap:var(--space-8)}

    .tabs{display:flex;gap:0;border-bottom:2px solid var(--color-border);margin-bottom:var(--space-16)}
    .tab-btn{padding:var(--space-10) var(--space-16);border:none;background:none;cursor:pointer;font-size:var(--font-size-sm);
      font-weight:var(--font-weight-medium);color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-2px;
      transition:all var(--duration-fast)}
    .tab-btn:hover{color:var(--color-text)}
    .tab-btn.active{color:var(--color-primary);border-bottom-color:var(--color-primary)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}

    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-12)}
    .form-group{margin-bottom:var(--space-12)}
    .form-group label{display:block;font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);color:var(--color-text-secondary);margin-bottom:var(--space-4)}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:var(--space-8) var(--space-12);
      border-radius:var(--radius-base);border:1px solid var(--color-border);background:var(--color-background);
      color:var(--color-text);font-size:var(--font-size-base);font-family:inherit}
    .form-group textarea{min-height:70px;resize:vertical}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:2px solid var(--color-primary);border-color:var(--color-primary)}

    .score-grid{display:grid;grid-template-columns:1fr auto;gap:var(--space-8) var(--space-16);align-items:center}
    .score-label{font-size:var(--font-size-sm);color:var(--color-text)}
    .star-rating{display:flex;gap:2px}
    .star-rating button{background:none;border:none;font-size:20px;cursor:pointer;padding:0 2px;opacity:0.3;transition:opacity var(--duration-fast)}
    .star-rating button.filled{opacity:1}
    .star-rating button:hover{opacity:0.8}
    .score-result{margin-top:var(--space-16);padding:var(--space-16);border-radius:var(--radius-md);text-align:center}
    .score-number{font-size:var(--font-size-4xl);font-weight:var(--font-weight-bold)}
    .score-category{font-size:var(--font-size-lg);font-weight:var(--font-weight-semibold);margin-top:var(--space-4)}

    .timeline{position:relative;padding-left:24px}
    .timeline::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:var(--color-border)}
    .timeline-item{position:relative;margin-bottom:var(--space-16);padding-left:var(--space-12)}
    .timeline-item::before{content:'';position:absolute;left:-20px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--color-primary);border:2px solid var(--color-surface)}
    .timeline-date{font-size:var(--font-size-xs);color:var(--color-text-secondary)}
    .timeline-text{font-size:var(--font-size-sm);margin-top:var(--space-4)}

    .reunion-card{border:1px solid var(--color-card-border);border-radius:var(--radius-md);padding:var(--space-12);margin-bottom:var(--space-8)}
    .reunion-card h4{font-size:var(--font-size-sm);margin-bottom:var(--space-4)}
    .reunion-card p{font-size:var(--font-size-sm);color:var(--color-text-secondary);margin:0}

    .empty-state{text-align:center;padding:var(--space-32);color:var(--color-text-secondary);font-size:var(--font-size-sm)}

    @media(max-width:900px){
      .kanban-container{flex-direction:column}
      .kanban-column{max-width:100%;min-width:100%}
      .form-row{grid-template-columns:1fr}
    }
    @font-face{font-family:'FKGroteskNeue';src:url('https://r2cdn.perplexity.ai/fonts/FKGroteskNeue.woff2') format('woff2')}
  </style>
</head>
<body>

<header class="app-header">
  <h1>🧪 Pipeline de Productos Externos</h1>
  <div class="header-actions">
    <div class="view-toggle">
      <button class="active" onclick="setView('kanban')" id="btnViewKanban">📋 Kanban</button>
      <button onclick="setView('table')" id="btnViewTable">📊 Tabla</button>
    </div>
    <button class="btn btn--primary" onclick="openNewProductModal()">+ Nuevo Producto</button>
    <a href="ensayos.html" class="btn btn--secondary">← Ensayos</a>
  </div>
</header>

<section class="kpi-bar" id="kpiBar"></section>

<section class="filters-bar">
  <div class="filter-group">
    <label>Empresa</label>
    <select id="filtroEmpresa" onchange="renderAll()"><option value="">Todas</option></select>
  </div>
  <div class="filter-group">
    <label>Tipo producto</label>
    <select id="filtroTipo" onchange="renderAll()">
      <option value="">Todos</option>
      <option value="fungicida">Fungicida</option>
      <option value="insecticida">Insecticida</option>
      <option value="bioestimulante">Bioestimulante</option>
      <option value="poscosecha">Poscosecha</option>
      <option value="fertilizante">Fertilizante</option>
      <option value="biologico">Biológico</option>
      <option value="otro">Otro</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Cultivo</label>
    <select id="filtroCultivo" onchange="renderAll()">
      <option value="">Todos</option>
      <option value="banano">Banano</option>
      <option value="citricos">Cítricos</option>
      <option value="ambos">Ambos</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Buscar</label>
    <input type="text" id="filtroBuscar" placeholder="Nombre, empresa..." oninput="renderAll()">
  </div>
</section>

<main class="kanban-container" id="kanbanView"></main>

<div class="table-container" id="tableView">
  <table class="data-table">
    <thead>
      <tr>
        <th>Producto</th><th>Empresa</th><th>Tipo</th><th>Cultivo</th>
        <th>Puntuación</th><th>Estado</th><th>Fecha ingreso</th><th>Decisión</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="modal-overlay" id="modalProducto">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalProductoTitulo">Registrar Producto</h2>
      <button class="modal-close" onclick="closeModal('modalProducto')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Empresa *</label>
          <select id="prod_empresa" required>
            <option value="">Seleccionar o crear nueva...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Nueva empresa (si no existe)</label>
          <input type="text" id="prod_nueva_empresa" placeholder="Nombre de la empresa">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Nombre comercial *</label>
          <input type="text" id="prod_nombre" required>
        </div>
        <div class="form-group">
          <label>Ingrediente activo</label>
          <input type="text" id="prod_ia">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tipo de producto *</label>
          <select id="prod_tipo">
            <option value="fungicida">Fungicida</option>
            <option value="insecticida">Insecticida</option>

<script>
let productos = [];
let empresas = [];
let reuniones = [];
let historial = [];
let editandoProductoId = null;
let detalleProductoId = null;
let currentView = 'kanban';

const ESTADOS = [
  {key:'recibido', label:'Recibido', icon:'📥'},
  {key:'info_incompleta', label:'Info incompleta', icon:'⚠️'},
  {key:'en_evaluacion', label:'En evaluación', icon:'🔍'},
  {key:'aprobado_reunion', label:'Aprobado reunión', icon:'🤝'},
  {key:'propuesto_ensayo', label:'Propuesto ensayo', icon:'📋'},
  {key:'ensayo_campo', label:'Ensayo en campo', icon:'🌱'},
  {key:'cerrado', label:'Cerrado', icon:'✅'},
  {key:'rechazado', label:'Rechazado', icon:'❌'}
];
const ESTADO_MAP = {};
ESTADOS.forEach(e => ESTADO_MAP[e.key] = e);

const CRITERIOS = [
  {key:'coherencia_cientifica', label:'Coherencia científica'},
  {key:'evidencia_previa', label:'Evidencia previa (ensayos, publicaciones)'},
  {key:'relevancia_problemas', label:'Relevancia para problemas actuales'},
  {key:'riesgo_regulatorio', label:'Riesgo / estado regulatorio'},
  {key:'diferenciacion', label:'Diferenciación vs lo que ya usamos'}
];

function getEmpresa(id){ return empresas.find(e => e.id === id) }
function getProducto(id){ return productos.find(p => p.id === id) }
function escapeHtml(t){ const d = document.createElement('div'); d.textContent = t || '-'; return d.innerHTML }
function calcScore(ev){
  if(!ev) return null;
  const sum = (ev.coherencia_cientifica||0)+(ev.evidencia_previa||0)+(ev.relevancia_problemas||0)+(ev.riesgo_regulatorio||0)+(ev.diferenciacion||0);
  return Math.round((sum/25)*100);
}
function getCategoria(score){
  if(score===null||score===undefined) return null;
  if(score<40) return 'no_apto';
  if(score<60) return 'solo_reunion';
  if(score<80) return 'apto_ensayo';
  return 'prioridad_alta';
}
function getCategoriaLabel(cat){
  const map = {no_apto:'❌ No apto',solo_reunion:'🟡 Solo reunión',apto_ensayo:'✅ Apto para ensayo',prioridad_alta:'🔥 Prioridad alta'};
  return map[cat]||'-';
}
function getScoreClass(score){
  if(score===null) return '';
  if(score>=80) return 'high';
  if(score>=60) return 'medium';
  if(score>=40) return 'low';
  return 'none';
}
function addHistorialLocal(prodId,accion,detalle){
  historial.push({producto_id:prodId,fecha:new Date().toISOString().split('T')[0],accion:accion,detalle:detalle||''});
}

function getFilteredProducts(){
  const emp = document.getElementById('filtroEmpresa').value;
  const tipo = document.getElementById('filtroTipo').value;
  const cult = document.getElementById('filtroCultivo').value;
  const buscar = document.getElementById('filtroBuscar').value.toLowerCase();
  return productos.filter(p => {
    if(emp && p.empresa_id !== emp) return false;
    if(tipo && p.tipo_producto !== tipo) return false;
    if(cult && p.cultivos_objetivo !== cult) return false;
    if(buscar){
      const e = getEmpresa(p.empresa_id);
      const searchable = (p.nombre_comercial+' '+(e?e.nombre:'')+' '+(p.problema_objetivo||'')+' '+(p.ingrediente_activo||'')).toLowerCase();
      if(!searchable.includes(buscar)) return false;
    }
    return true;
  });
}

function renderKPIs(){
  const total = productos.length;
  const enPipeline = productos.filter(p => !['rechazado','cerrado'].includes(p.estado)).length;
  const enEnsayo = productos.filter(p => p.estado === 'ensayo_campo').length;
  const rechazados = productos.filter(p => p.estado === 'rechazado').length;
  const tasaConversion = total ? Math.round((productos.filter(p=>['ensayo_campo','cerrado'].includes(p.estado)&&p.decision_final!=='no_adoptar').length/total)*100) : 0;
  const empresasActivas = new Set(productos.filter(p=>!['rechazado','cerrado'].includes(p.estado)).map(p=>p.empresa_id)).size;

  document.getElementById('kpiBar').innerHTML = `
    <div class="kpi-card"><div class="kpi-value">${total}</div><div class="kpi-label">Productos totales</div></div>
    <div class="kpi-card"><div class="kpi-value">${enPipeline}</div><div class="kpi-label">En pipeline activo</div></div>
    <div class="kpi-card"><div class="kpi-value">${enEnsayo}</div><div class="kpi-label">En ensayo</div></div>
    <div class="kpi-card"><div class="kpi-value">${empresasActivas}</div><div class="kpi-label">Empresas activas</div></div>
    <div class="kpi-card"><div class="kpi-value">${tasaConversion}%</div><div class="kpi-label">Tasa a ensayo</div></div>
    <div class="kpi-card"><div class="kpi-value">${rechazados}</div><div class="kpi-label">Rechazados</div></div>
  `;
}

function renderKanban(){
  const filtered = getFilteredProducts();
  const cols = ESTADOS.filter(e => e.key !== 'ensayo_diseño');
  let html = '';
  cols.forEach(col => {
    const prods = filtered.filter(p => p.estado === col.key);
    html += `<div class="kanban-column col-${col.key.replace(/_/g,'-')}">
      <div class="kanban-column-header">${col.icon} ${col.label} <span class="col-count">${prods.length}</span></div>
      <div class="kanban-column-body" data-estado="${col.key}"
           ondragover="event.preventDefault();this.classList.add('drag-over')"
           ondragleave="this.classList.remove('drag-over')"
           ondrop="dropProduct(event,'${col.key}');this.classList.remove('drag-over')">`;
    if(prods.length === 0){
      html += `<div class="empty-state">Sin productos</div>`;
    }
    prods.forEach(p => {
      const emp = getEmpresa(p.empresa_id);
      const scoreHtml = p.puntuacion_total !== null && p.puntuacion_total !== undefined
        ? `<span class="tag tag-score ${getScoreClass(p.puntuacion_total)}">${p.puntuacion_total}/100</span>`
        : '';
      html += `<div class="product-card" draggable="true" data-id="${p.id}"
                ondragstart="dragProduct(event,'${p.id}')"
                onclick="openDetail('${p.id}')">
        <div class="product-card-name">${escapeHtml(p.nombre_comercial)}</div>
        <div class="product-card-empresa">${escapeHtml(emp?emp.nombre:'')}</div>
        <div class="product-card-meta">
          <span class="tag tag-tipo">${escapeHtml(p.tipo_producto)}</span>
          <span class="tag tag-cultivo">${escapeHtml(p.cultivos_objetivo)}</span>
          ${scoreHtml}
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('kanbanView').innerHTML = html;
}

function renderTable(){
  const filtered = getFilteredProducts();
  let html = '';
  filtered.forEach(p => {
    const emp = getEmpresa(p.empresa_id);
    const est = ESTADO_MAP[p.estado] || {};
    html += `<tr onclick="openDetail('${p.id}')">
      <td><strong>${escapeHtml(p.nombre_comercial)}</strong></td>
      <td>${escapeHtml(emp?emp.nombre:'')}</td>
      <td>${escapeHtml(p.tipo_producto)}</td>
      <td>${escapeHtml(p.cultivos_objetivo)}</td>
      <td>${p.puntuacion_total !== null && p.puntuacion_total !== undefined ? `<span class="tag tag-score ${getScoreClass(p.puntuacion_total)}">${p.puntuacion_total}/100</span>` : '-'}</td>
      <td>${est.icon||''} ${est.label||p.estado}</td>
      <td>${p.creado_en || ''}</td>
      <td>${p.decision_final ? escapeHtml(p.decision_final) : '-'}</td>
    </tr>`;
  });
  document.getElementById('tableBody').innerHTML = html || '<tr><td colspan="8" class="empty-state">No hay productos</td></tr>';
}

function renderEmpresaSelects(){
  const opts = empresas.map(e => `<option value="${e.id}">${escapeHtml(e.nombre)}</option>`).join('');
  document.getElementById('prod_empresa').innerHTML = `<option value="">Seleccionar...</option>${opts}`;
  document.getElementById('filtroEmpresa').innerHTML = `<option value="">Todas</option>${opts}`;
}

function renderAll(){
  renderKPIs();
  renderKanban();
  renderTable();
}

function setView(v){
  currentView = v;
  document.getElementById('kanbanView').style.display = v==='kanban'?'flex':'none';
  document.getElementById('tableView').classList.toggle('active',v==='table');
  document.getElementById('btnViewKanban').classList.toggle('active',v==='kanban');
  document.getElementById('btnViewTable').classList.toggle('active',v==='table');
}

let draggedProductId = null;
function dragProduct(e,id){ draggedProductId = id; e.dataTransfer.effectAllowed = 'move'; e.target.classList.add('dragging') }
async function dropProduct(e,newEstado){
  e.preventDefault();
  if(!draggedProductId) return;
  const p = getProducto(draggedProductId);
  if(p && p.estado !== newEstado){
    const oldEstado = p.estado;
    p.estado = newEstado;
    addHistorialLocal(p.id,`Estado: ${ESTADO_MAP[newEstado]?.label||newEstado}`,`Cambio desde ${ESTADO_MAP[oldEstado]?.label||oldEstado}`);
    try{
      await DB.productos_externos.cambiarEstado(p.id, newEstado);
    }catch(err){
      console.error(err);
      alert('Error actualizando estado en Supabase');
    }
    renderAll();
  }
  draggedProductId = null;
}

function openModal(id){ document.getElementById(id).classList.add('active') }
function closeModal(id){ document.getElementById(id).classList.remove('active') }

function openNewProductModal(){
  editandoProductoId = null;
  document.getElementById('modalProductoTitulo').textContent = 'Registrar Nuevo Producto';
  ['prod_nombre','prod_ia','prod_modo_accion','prod_problema','prod_pais','prod_contacto','prod_notas','prod_nueva_empresa'].forEach(id=>{
    document.getElementById(id).value = '';
  });
  document.getElementById('prod_empresa').value = '';
  document.getElementById('prod_tipo').value = 'fungicida';
  document.getElementById('prod_cultivo').value = 'banano';
  document.getElementById('prod_registro_rd').value = 'no';
  openModal('modalProducto');
}

async function saveProduct(){
  const nombre = document.getElementById('prod_nombre').value.trim();
  const problema = document.getElementById('prod_problema').value.trim();
  if(!nombre){ alert('El nombre comercial es obligatorio'); return }
  if(!problema){ alert('El problema objetivo es obligatorio'); return }

  let empresa_id = document.getElementById('prod_empresa').value;
  const nuevaEmpresa = document.getElementById('prod_nueva_empresa').value.trim();
  if(!empresa_id && !nuevaEmpresa){ alert('Selecciona o crea una empresa'); return }

  try {
    if(!empresa_id && nuevaEmpresa){
      const { data: newEmp, error: empErr } = await DB.empresas.crear({
        nombre: nuevaEmpresa,
        pais: document.getElementById('prod_pais').value.trim() || null,
        contacto_nombre: null,
        contacto_email: null,
        activa: true
      });
      if(empErr) throw empErr;
      empresas.push(newEmp);
      empresa_id = newEmp.id;
      renderEmpresaSelects();
    }

    const datos = {
      empresa_id: empresa_id,
      nombre_comercial: nombre,
      ingrediente_activo: document.getElementById('prod_ia').value.trim() || null,
      tipo_producto: document.getElementById('prod_tipo').value,
      modo_accion: document.getElementById('prod_modo_accion').value.trim() || null,
      cultivos_objetivo: document.getElementById('prod_cultivo').value,
      problema_objetivo: problema,
      pais_origen: document.getElementById('prod_pais').value.trim() || null,
      registro_rd: document.getElementById('prod_registro_rd').value,
      contacto: document.getElementById('prod_contacto').value.trim() || null,
      notas_internas: document.getElementById('prod_notas').value.trim() || null,
      creado_por: window.SESION ? window.SESION.nombre : 'I+D'
    };

    let prodResp;
    if(editandoProductoId){
      prodResp = await DB.productos_externos.actualizar(editandoProductoId, datos);
    } else {
      prodResp = await DB.productos_externos.crear(datos);
    }
    if(prodResp.error) throw prodResp.error;
    await loadFromSupabase();
    closeModal('modalProducto');
  } catch(err){
    console.error(err);
    alert('Error guardando producto: ' + (err.message || err));
  }
}

function openDetail(id){
  detalleProductoId = id;
  const p = getProducto(id);
  if(!p) return;
  const emp = getEmpresa(p.empresa_id);

  document.getElementById('detalle_nombre').textContent = p.nombre_comercial;
  document.getElementById('detalle_empresa').textContent = emp ? `${emp.nombre} · ${ESTADO_MAP[p.estado]?.icon||''} ${ESTADO_MAP[p.estado]?.label||p.estado}` : '';

  document.getElementById('info_nombre').textContent = p.nombre_comercial;
  document.getElementById('info_ia').textContent = p.ingrediente_activo || '-';
  document.getElementById('info_tipo').textContent = p.tipo_producto;
  document.getElementById('info_modo').textContent = p.modo_accion || '-';
  document.getElementById('info_cultivo').textContent = p.cultivos_objetivo;
  document.getElementById('info_problema').textContent = p.problema_objetivo;
  document.getElementById('info_pais').textContent = p.pais_origen || '-';
  document.getElementById('info_registro').textContent = {si:'✅ Sí',no:'❌ No',tramite:'⏳ En trámite'}[p.registro_rd] || '-';
  document.getElementById('info_contacto').textContent = p.contacto || '-';
  document.getElementById('info_notas').value = p.notas_internas || '';

  renderScoreGrid(p);
  renderReuniones(p);
  renderEnsayoTab(p);
  renderHistorial(p);
  renderDetailActions(p);

  switchTab('tabInfo');
  openModal('modalDetalle');
}

async function saveNotes(){
  const p = getProducto(detalleProductoId);
  if(p){
    const notas = document.getElementById('info_notas').value;
    p.notas_internas = notas;
    try{
      await DB.productos_externos.actualizar(p.id, { notas_internas: notas });
    }catch(err){
      console.error(err);
      alert('Error guardando notas en Supabase');
    }
  }
}

async function deleteProduct(){
  if(!confirm('¿Eliminar este producto del pipeline?')) return;
  const id = detalleProductoId;
  try{
    await DB.productos_externos.eliminar(id);
    productos = productos.filter(p => p.id !== id);
    closeModal('modalDetalle');
    renderAll();
  }catch(err){
    console.error(err);
    alert('Error eliminando producto: ' + (err.message || err));
  }
}

function switchTab(tabId){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  const idx = ['tabInfo','tabEval','tabReuniones','tabEnsayo','tabHistorial'].indexOf(tabId);
  document.querySelectorAll('.tab-btn')[idx]?.classList.add('active');
}

function renderScoreGrid(p){
  const ev = p.evaluacion || {};
  let html = '';
  CRITERIOS.forEach(c => {
    const val = ev[c.key] || 0;
    html += `<div class="score-label">${c.label}</div>
      <div class="star-rating" data-criterio="${c.key}">`;
    for(let i=1;i<=5;i++){
      html += `<button type="button" class="${i<=val?'filled':''}" onclick="setScore('${c.key}',${i})">★</button>`;
    }
    html += `</div>`;
  });
  document.getElementById('scoreGrid').innerHTML = html;
  document.getElementById('eval_comentarios').value = ev.comentarios || '';

  if(p.puntuacion_total !== null && p.puntuacion_total !== undefined){
    const cat = p.categoria_evaluacion;
    const colorMap = {no_apto:'var(--color-error)',solo_reunion:'var(--color-warning)',apto_ensayo:'rgb(59,130,246)',prioridad_alta:'var(--color-success)'};
    document.getElementById('scoreResult').style.display = 'block';
    document.getElementById('scoreResult').innerHTML = `
      <div class="score-number" style="color:${colorMap[cat]||'inherit'}">${p.puntuacion_total}/100</div>
      <div class="score-category">${getCategoriaLabel(cat)}</div>`;
  } else {
    document.getElementById('scoreResult').style.display = 'none';
  }
}

function setScore(criterio, valor){
  const p = getProducto(detalleProductoId);
  if(!p) return;
  if(!p.evaluacion) p.evaluacion = {};
  p.evaluacion[criterio] = valor;

  const stars = document.querySelector(`.star-rating[data-criterio="${criterio}"]`);
  if(stars){
    stars.querySelectorAll('button').forEach((btn,i) => {
      btn.classList.toggle('filled', i < valor);
    });
  }
}

async function saveEvaluation(){
  const p = getProducto(detalleProductoId);
  if(!p) { alert('Asigna al menos un criterio'); return }
  const ev = p.evaluacion || {};
  ev.comentarios = document.getElementById('eval_comentarios').value;
  p.puntuacion_total = calcScore(ev);
  p.categoria_evaluacion = getCategoria(p.puntuacion_total);

  try{
    await DB.evaluaciones_producto.crear({
      producto_id: p.id,
      coherencia_cientifica: ev.coherencia_cientifica||0,
      evidencia_previa: ev.evidencia_previa||0,
      relevancia_problemas: ev.relevancia_problemas||0,
      riesgo_regulatorio: ev.riesgo_regulatorio||0,
      diferenciacion: ev.diferenciacion||0,
      comentarios: ev.comentarios || '',
      evaluado_por: window.SESION ? window.SESION.nombre : 'I+D'
    });
    await DB.productos_externos.actualizar(p.id, {
      puntuacion_total: p.puntuacion_total,
      categoria_evaluacion: p.categoria_evaluacion,
      estado: (p.estado === 'recibido' || p.estado === 'info_incompleta') ? 'en_evaluacion' : p.estado
    });
  }catch(err){
    console.error(err);
    alert('Error guardando evaluación en Supabase');
  }

  if(p.estado === 'recibido' || p.estado === 'info_incompleta'){
    p.estado = 'en_evaluacion';
    addHistorialLocal(p.id,'Estado: En evaluación','Evaluación técnica iniciada');
  }
  addHistorialLocal(p.id,'Evaluación completada',`Puntuación: ${p.puntuacion_total}/100 - ${getCategoriaLabel(p.categoria_evaluacion)}`);

  renderScoreGrid(p);
  renderDetailActions(p);
  renderAll();
  alert(`Evaluación guardada: ${p.puntuacion_total}/100 — ${getCategoriaLabel(p.categoria_evaluacion)}`);
}

async function renderReuniones(p){
  try{
    const { data: reu, error } = await DB.reuniones_producto.listarPorProducto(p.id);
    if(error) throw error;
    if(!reu || reu.length === 0){
      document.getElementById('reunionesList').innerHTML = '<div class="empty-state">No hay reuniones registradas</div>';
      return;
    }
    let html = '';
    reu.forEach(r => {
      html += `<div class="reunion-card">
        <h4>📅 ${r.fecha_reunion} — ${(r.participantes_internos||[]).join(', ')}</h4>
        <p><strong>Resumen:</strong> ${escapeHtml(r.resumen||'')}</p>
        <p style="margin-top:var(--space-4)"><strong>Acuerdos:</strong> ${escapeHtml(r.acuerdos||'')}</p>
      </div>`;
    });
    document.getElementById('reunionesList').innerHTML = html;
  }catch(err){
    console.error(err);
    document.getElementById('reunionesList').innerHTML = '<div class="empty-state">Error cargando reuniones</div>';
  }
}

function openReunionForm(){
  document.getElementById('reunionForm').style.display = 'block';
  document.getElementById('reunion_fecha').value = new Date().toISOString().split('T')[0];
  document.getElementById('reunion_internos').value = '';
  document.getElementById('reunion_resumen').value = '';
  document.getElementById('reunion_acuerdos').value = '';
}

async function saveReunion(){
  const fecha = document.getElementById('reunion_fecha').value;
  const resumen = document.getElementById('reunion_resumen').value.trim();
  if(!fecha||!resumen){ alert('Fecha y resumen son obligatorios'); return }

  try{
    await DB.reuniones_producto.crear({
      producto_id: detalleProductoId,
      fecha_reunion: fecha,
      participantes_internos: document.getElementById('reunion_internos').value.split(',').map(s=>s.trim()).filter(Boolean),
      participantes_empresa: [],
      resumen: resumen,
      acuerdos: document.getElementById('reunion_acuerdos').value.trim(),
      creado_por: window.SESION ? window.SESION.nombre : 'I+D'
    });
    addHistorialLocal(detalleProductoId,'Reunión realizada',`Fecha: ${fecha}`);
    document.getElementById('reunionForm').style.display = 'none';
    const p = getProducto(detalleProductoId);
    if(p) renderReuniones(p);
  }catch(err){
    console.error(err);
    alert('Error guardando reunión en Supabase');
  }
}

async function renderEnsayoTab(p){
  let html = '';
  if(p.ensayo_id){
    html = `<div style="padding:var(--space-16);background:rgba(var(--color-success-rgb),0.08);border-radius:var(--radius-md);margin-bottom:var(--space-12)">
      <h4 style="color:var(--color-success)">🧪 Ensayo vinculado: ${escapeHtml(p.ensayo_id)}</h4>
      <p style="font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-top:var(--space-4)">
        Este producto tiene un ensayo activo. Puedes verlo en tu módulo de Ensayos.
      </p>
      <a href="ensayo-detalle.html?id=${encodeURIComponent(p.ensayo_id)}" class="btn btn--success btn--sm" style="margin-top:var(--space-8)">Ver ensayo →</a>
    </div>`;
  } else if(['propuesto_ensayo','aprobado_reunion','en_evaluacion'].includes(p.estado) && p.puntuacion_total >= 60){
    html = `<div style="padding:var(--space-16);background:rgba(59,130,246,0.08);border-radius:var(--radius-md)">
      <h4>Este producto puede pasar a ensayo</h4>
      <p style="font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-top:var(--space-4)">
        Puntuación: ${p.puntuacion_total}/100 — ${getCategoriaLabel(p.categoria_evaluacion)}<br>
        Al aprobar, se creará un pre-ensayo en tu módulo de Ensayos vinculado a este producto.
      </p>
      <button class="btn btn--primary btn--sm" style="margin-top:var(--space-12)" onclick="crearPreEnsayo()">🧪 Crear Pre-Ensayo</button>
    </div>`;
  } else {
    html = `<div class="empty-state">Este producto aún no está listo para ensayo. Completa la evaluación primero.</div>`;
  }

  if(p.decision_final){
    const decMap = {adoptar:'✅ Adoptar',no_adoptar:'❌ No adoptar',observacion:'👀 En observación'};
    html += `<div style="padding:var(--space-16);border:2px solid var(--color-border);border-radius:var(--radius-md);margin-top:var(--space-12)">
      <h4>Decisión final: ${decMap[p.decision_final]||p.decision_final}</h4>
      ${p.motivo_rechazo ? `<p style="font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-top:var(--space-4)">Motivo: ${escapeHtml(p.motivo_rechazo)}</p>` : ''}
    </div>`;
  }
  document.getElementById('ensayoStatus').innerHTML = html;
}

async function crearPreEnsayo(){
  try{
    const resp = await crearPreEnsayoDesdeProducto(detalleProductoId);
    if(resp.error){
      console.error(resp.error);
      alert('Error creando pre-ensayo: ' + resp.error.message);
      return;
    }
    alert('✅ Pre-ensayo creado con ID: ' + resp.ensayoId + '. Revisa tu módulo de Ensayos.');
    await loadFromSupabase();
    openDetail(detalleProductoId);
  }catch(err){
    console.error(err);
    alert('Error inesperado creando pre-ensayo');
  }
}

async function renderHistorial(p){
  try{
    const { data: items, error } = await DB.historial_producto.listarPorProducto(p.id);
    if(error) throw error;
    if(!items || items.length === 0){
      document.getElementById('historialTimeline').innerHTML = '<div class="empty-state">Sin historial</div>';
      return;
    }
    let html = '';
    items.forEach(h => {
      html += `<div class="timeline-item">
        <div class="timeline-date">${h.fecha?.substring(0,10) || ''}</div>
        <div class="timeline-text"><strong>${escapeHtml(h.accion)}</strong> — ${escapeHtml(h.detalle)}</div>
      </div>`;
    });
    document.getElementById('historialTimeline').innerHTML = html;
  }catch(err){
    console.error(err);
    document.getElementById('historialTimeline').innerHTML = '<div class="empty-state">Error cargando historial</div>';
  }
}

function renderDetailActions(p){
  let html = '';
  const st = p.estado;

  if(st === 'recibido'){
    html += `<button class="btn btn--warning btn--sm" onclick="changeEstado('info_incompleta')">⚠️ Info incompleta</button>`;
    html += `<button class="btn btn--primary btn--sm" onclick="switchTab('tabEval')">🔍 Evaluar</button>`;
    html += `<button class="btn btn--danger btn--sm" onclick="rechazar()">❌ Rechazar</button>`;
  }
  if(st === 'info_incompleta'){
    html += `<button class="btn btn--primary btn--sm" onclick="changeEstado('recibido')">📥 Marcar completo</button>`;
    html += `<button class="btn btn--danger btn--sm" onclick="rechazar()">❌ Rechazar</button>`;
  }
  if(st === 'en_evaluacion'){
    if(p.puntuacion_total >= 40){
      html += `<button class="btn btn--success btn--sm" onclick="changeEstado('aprobado_reunion')">🤝 Aprobar reunión</button>`;
    }
    if(p.puntuacion_total >= 60){
      html += `<button class="btn btn--primary btn--sm" onclick="changeEstado('propuesto_ensayo')">📋 Proponer ensayo</button>`;
    }
    html += `<button class="btn btn--danger btn--sm" onclick="rechazar()">❌ Rechazar</button>`;
  }
  if(st === 'aprobado_reunion'){
    html += `<button class="btn btn--primary btn--sm" onclick="changeEstado('propuesto_ensayo')">📋 Proponer ensayo</button>`;
    html += `<button class="btn btn--danger btn--sm" onclick="rechazar()">❌ Rechazar</button>`;
  }
  if(st === 'propuesto_ensayo'){
    html += `<button class="btn btn--success btn--sm" onclick="crearPreEnsayo()">🧪 Crear Pre-Ensayo</button>`;
    html += `<button class="btn btn--danger btn--sm" onclick="rechazar()">❌ Rechazar</button>`;
  }
  if(st === 'ensayo_campo'){
    html += `<button class="btn btn--success btn--sm" onclick="cerrarConDecision('adoptar')">✅ Adoptar</button>`;
    html += `<button class="btn btn--warning btn--sm" onclick="cerrarConDecision('observacion')">👀 Observación</button>`;
    html += `<button class="btn btn--danger btn--sm" onclick="cerrarConDecision('no_adoptar')">❌ No adoptar</button>`;
  }

  document.getElementById('detalleFooter').innerHTML = html;
}

async function changeEstado(nuevoEstado){
  const p = getProducto(detalleProductoId);
  if(!p) return;
  const old = p.estado;
  p.estado = nuevoEstado;
  addHistorialLocal(p.id,`Estado: ${ESTADO_MAP[nuevoEstado]?.label||nuevoEstado}`,`Cambio desde ${ESTADO_MAP[old]?.label||old}`);
  try{
    await DB.productos_externos.cambiarEstado(p.id, nuevoEstado);
  }catch(err){
    console.error(err);
    alert('Error actualizando estado en Supabase');
  }
  openDetail(detalleProductoId);
  renderAll();
}

async function rechazar(){
  const motivo = prompt('Motivo del rechazo:');
  if(motivo === null) return;
  const p = getProducto(detalleProductoId);
  if(!p) return;
  p.estado = 'rechazado';
  p.decision_final = 'no_adoptar';
  p.motivo_rechazo = motivo;
  addHistorialLocal(p.id,'Estado: Rechazado',motivo || 'Sin motivo especificado');
  try{
    await DB.productos_externos.actualizar(p.id, {
      estado: 'rechazado',
      decision_final: 'no_adoptar',
      motivo_rechazo: motivo || null
    });
  }catch(err){
    console.error(err);
    alert('Error actualizando en Supabase');
  }
  openDetail(detalleProductoId);
  renderAll();
}

async function cerrarConDecision(decision){
  const p = getProducto(detalleProductoId);
  if(!p) return;
  let motivo = '';
  if(decision === 'no_adoptar'){
    motivo = prompt('Motivo de no adopción:') || '';
  }
  p.estado = 'cerrado';
  p.decision_final = decision;
  p.motivo_rechazo = motivo;
  const decMap = {adoptar:'Adoptar',no_adoptar:'No adoptar',observacion:'En observación'};
  addHistorialLocal(p.id,`Cerrado: ${decMap[decision]}`,motivo || 'Ensayo finalizado');
  try{
    await DB.productos_externos.actualizar(p.id, {
      estado: 'cerrado',
      decision_final: decision,
      motivo_rechazo: motivo || null
    });
  }catch(err){
    console.error(err);
    alert('Error actualizando en Supabase');
  }
  openDetail(detalleProductoId);
  renderAll();
}

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', function(e){
    if(e.target === this) this.classList.remove('active');
  });
});

async function loadFromSupabase() {
  try {
    const { data: empData, error: empErr } = await DB.empresas.listar();
    if (empErr) throw empErr;
    empresas = empData || [];

    const { data: prodData, error: prodErr } = await DB.productos_externos.listar();
    if (prodErr) throw prodErr;
    productos = prodData || [];

    reuniones = [];
    historial = [];

    renderEmpresaSelects();
    renderAll();
  } catch (e) {
    console.error(e);
    alert("Error cargando datos de Supabase: " + (e.message || e));
  }
}

loadFromSupabase();
</script>
</body>
</html>
