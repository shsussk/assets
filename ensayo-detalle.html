<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detalle de ensayo · I+D</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --color-primary: #4caf50;
      --color-bg: #f8fafb;
      --color-card: #ffffff;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--color-bg);
      color: #1f2933;
      line-height: 1.4;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .header h1 {
      font-size: 1.6rem;
      color: #2c3e50;
    }
    .header small {
      display: block;
      font-size: 0.8rem;
      color: #6b7280;
    }
    .header-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .btn {
      background: var(--color-primary);
      color: #ffffff;
      border: none;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn-secondary { background: #6b7280; }
    .btn-danger { background: #ef4444; }
    .btn:hover { opacity: 0.95; }

    .grid-main {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1.4fr);
      gap: 18px;
    }
    .card {
      background: var(--color-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 18px;
    }
    .card h2, .card h3 {
      font-size: 1rem;
      margin-bottom: 8px;
      color: #111827;
    }
    .card-section {
      margin-top: 10px;
    }
    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      margin-bottom: 4px;
    }
    .value {
      font-size: 0.9rem;
      color: #111827;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-right: 6px;
      margin-bottom: 4px;
    }
    .tag-area { background: #e0f2fe; color: #0369a1; }
    .tag-estado { background: #ecfdf3; color: #166534; }
    .tag-prioridad { background: #fef3c7; color: #92400e; }

    .form-group {
      margin-bottom: 10px;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: #4b5563;
      margin-bottom: 3px;
    }
    .form-group select,
    .form-group input[type="file"],
    .form-group input[type="text"],
    .form-group textarea {
      width: 100%;
      padding: 7px 9px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 0.85rem;
    }
    .form-group textarea {
      min-height: 60px;
      resize: vertical;
    }

    .files-section {
      margin-top: 6px;
    }
    .files-section h3 {
      margin-top: 8px;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }
    ul.files-list {
      list-style: none;
      margin-top: 4px;
    }
    ul.files-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px dashed #e5e7eb;
      font-size: 0.85rem;
      gap: 6px;
      flex-wrap: wrap;
    }
    ul.files-list li:last-child {
      border-bottom: none;
    }
    ul.files-list li span {
      flex: 1 1 auto;
      word-break: break-all;
    }
    ul.files-list li a {
      color: #2563eb;
      font-size: 0.8rem;
      text-decoration: none;
    }
    ul.files-list li a:hover {
      text-decoration: underline;
    }

    @media (max-width: 900px) {
      .grid-main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div>
        <h1 id="tituloEnsayo">Ensayo</h1>
        <small id="codigoEnsayo"></small>
      </div>
      <div class="header-buttons">
        <span id="userInfo" style="font-size:0.8rem;color:#6b7280;"></span>
        <a href="ensayos.html" class="btn btn-secondary">← Volver a ensayos</a>
        <a href="dashboard.html" class="btn btn-secondary">🏠 Dashboard</a>
        <button onclick="cerrarSesion()" class="btn btn-danger">Cerrar sesión</button>
      </div>
    </header>

    <div class="grid-main">
      <!-- DATOS DEL ENSAYO -->
      <section class="card" id="cardDatos">
        <h2>Información del ensayo</h2>
        <div class="card-section">
          <div class="label">Objetivo</div>
          <div class="value" id="objetivoEnsayo">-</div>
        </div>
        <div class="card-section">
          <div class="label">Hipótesis</div>
          <div class="value" id="hipotesisEnsayo">-</div>
        </div>
        <div class="card-section">
          <div class="label">Área / estado / prioridad</div>
          <div class="value">
            <span class="tag tag-area" id="tagArea">Sin área</span>
            <span class="tag tag-estado" id="tagEstado">-</span>
            <span class="tag tag-prioridad" id="tagPrioridad">-</span>
          </div>
        </div>
        <div class="card-section">
          <div class="label">Fechas</div>
          <div class="value" id="fechasEnsayo"></div>
        </div>
        <div class="card-section">
          <div class="label">Responsable</div>
          <div class="value" id="responsableEnsayo"></div>
        </div>
        <div class="card-section">
          <div class="label">Notas</div>
          <div class="value" id="notasEnsayo"></div>
        </div>
      </section>

      <!-- DOCUMENTOS -->
      <section class="card" id="cardArchivos">
        <h2>Documentación del ensayo</h2>

        <!-- FORMULARIO SUBIDA -->
        <div class="card-section">
          <form id="formSubirArchivo">
            <div class="form-group">
              <label for="tipo">Tipo de archivo</label>
              <select id="tipo" name="tipo" required>
                <option value="protocolo">Protocolo</option>
                <option value="base_datos">Base de datos</option>
              </select>
            </div>
            <div class="form-group">
              <label for="archivo">Archivo</label>
              <input type="file" id="archivo" name="archivo" required>
            </div>
            <button type="submit" class="btn">Subir archivo</button>
          </form>
        </div>

        <!-- LISTAS -->
        <div class="files-section">
          <h3>📄 Protocolo</h3>
          <ul id="listaProtocolo" class="files-list">
            <li>No hay protocolo cargado.</li>
          </ul>

          <h3 style="margin-top:10px;">📊 Bases de datos</h3>
          <ul id="listaBasesDatos" class="files-list">
            <li>No hay bases de datos cargadas.</li>
          </ul>
        </div>
      </section>
    </div>
  </div>

  <!-- LIBRERÍAS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth-guard.js"></script>

  <script>
    let ensayoId = null;

    document.addEventListener('DOMContentLoaded', async function () {
      if (window.SESION) {
        document.getElementById('userInfo').textContent =
          '👤 ' + (SESION.nombre || SESION.email) + ' (' + (SESION.rol || '-') + ')';
      }

      const params = new URLSearchParams(window.location.search);
      ensayoId = params.get('id');
      if (!ensayoId) {
        alert('No se proporcionó ID de ensayo');
        window.location.href = 'ensayos.html';
        return;
      }

      document.getElementById('formSubirArchivo')
        .addEventListener('submit', subirArchivo);

      await cargarEnsayo();
      await cargarArchivos();
    });

    // ========== CARGAR DATOS DEL ENSAYO (tabla ensayos) ==========
    async function cargarEnsayo() {
      const { data, error } = await supabase
        .from('ensayos')
        .select('*')
        .eq('id', ensayoId)
        .single();  // [web:35][web:40]

      if (error) {
        console.error(error);
        alert('Error al cargar el ensayo');
        return;
      }
      if (!data) {
        alert('Ensayo no encontrado');
        window.location.href = 'ensayos.html';
        return;
      }

      document.getElementById('tituloEnsayo').textContent =
        data.nombre || 'Ensayo sin título';
      document.getElementById('codigoEnsayo').textContent =
        data.codigo ? 'Código: ' + data.codigo : '';

      document.getElementById('objetivoEnsayo').textContent =
        data.objetivo || '-';
      document.getElementById('hipotesisEnsayo').textContent =
        data.hipotesis || '-';

      document.getElementById('tagArea').textContent =
        data.area || 'Sin área';
      document.getElementById('tagEstado').textContent =
        data.estado || '-';
      document.getElementById('tagPrioridad').textContent =
        data.prioridad || '-';

      const fechas = [];
      if (data.fecha_inicio) fechas.push('Inicio: ' + data.fecha_inicio);
      if (data.fecha_fin_estimado) fechas.push('Fin estimado: ' + data.fecha_fin_estimado);
      document.getElementById('fechasEnsayo').textContent =
        fechas.join(' · ') || '-';

      document.getElementById('responsableEnsayo').textContent =
        data.responsable || '-';

      document.getElementById('notasEnsayo').textContent =
        data.notas || '(sin notas)';
    }

    // ========== SUBIR ARCHIVO (Storage + tabla ensayos_archivos) ==========
    async function subirArchivo(event) {
      event.preventDefault();

      const form = event.target;
      const tipo = form.tipo.value; // 'protocolo' | 'base_datos'
      const fileInput = form.archivo;
      const file = fileInput.files[0];

      if (!file) {
        alert('Selecciona un archivo');
        return;
      }

      try {
        const originalName = file.name;
        const sanitizedName = originalName
          .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
          .replace(/[^\w.\- ]+/g, '')
          .replace(/\s+/g, '_');

        const timestamp = Date.now();
        const storagePath = `ens_${ensayoId}/${tipo}/${timestamp}_${sanitizedName}`;

        const { error: uploadError } = await supabase.storage
          .from('ensayos_archivos')   // nombre del bucket
          .upload(storagePath, file); // [web:11][web:42]

        if (uploadError) {
          console.error(uploadError);
          alert('Error al subir archivo: ' + uploadError.message);
          return;
        }

        const registro = {
          ensayo_id: ensayoId,
          tipo: tipo,
          nombre: originalName,
          path: storagePath,
          creado_por: window.SESION ? (SESION.email || SESION.nombre) : null
          // creado_el se llena solo con default now()
        };

        const { error: dbError } = await supabase
          .from('ensayos_archivos')
          .insert([registro]);       // [web:11][web:42]

        if (dbError) {
          console.error(dbError);
          alert('Archivo subido pero error en registro: ' + dbError.message);
          return;
        }

        fileInput.value = '';
        form.reset();
        await cargarArchivos();
        alert('Archivo subido correctamente');
      } catch (err) {
        console.error(err);
        alert('Error inesperado al subir archivo');
      }
    }

    // ========== LISTAR ARCHIVOS ==========
    async function cargarArchivos() {
      const { data, error } = await supabase
        .from('ensayos_archivos')
        .select('*')
        .eq('ensayo_id', ensayoId)
        .order('creado_el', { ascending: false }); // usar tu campo creado_el

      if (error) {
        console.error(error);
        return;
      }

      renderArchivos(data || []);
    }

    function renderArchivos(archivos) {
      const contProtocolo = document.getElementById('listaProtocolo');
      const contBD = document.getElementById('listaBasesDatos');

      contProtocolo.innerHTML = '';
      contBD.innerHTML = '';

      archivos.forEach(archivo => {
        const { data: urlData } = supabase.storage
          .from('ensayos_archivos')
          .getPublicUrl(archivo.path); // [web:11][web:42]

        const url = urlData.publicUrl;

        const li = document.createElement('li');
        li.innerHTML = `
          <span>${archivo.nombre}</span>
          <a href="${url}" target="_blank">Descargar</a>
        `;

        if (archivo.tipo === 'protocolo') {
          contProtocolo.appendChild(li);
        } else {
          contBD.appendChild(li);
        }
      });

      if (!contProtocolo.children.length) {
        contProtocolo.innerHTML = '<li>No hay protocolo cargado.</li>';
      }
      if (!contBD.children.length) {
        contBD.innerHTML = '<li>No hay bases de datos cargadas.</li>';
      }
    }
  </script>
</body>
</html>
